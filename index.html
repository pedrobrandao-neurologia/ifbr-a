/* PDF-safe: strip all non-ASCII */
const S=(str)=>{
    if(!str)return'';
    return str
        .replace(/á/g,'a').replace(/Á/g,'A').replace(/à/g,'a').replace(/À/g,'A')
        .replace(/â/g,'a').replace(/Â/g,'A').replace(/ã/g,'a').replace(/Ã/g,'A')
        .replace(/é/g,'e').replace(/É/g,'E').replace(/ê/g,'e').replace(/Ê/g,'E')
        .replace(/í/g,'i').replace(/Í/g,'I').replace(/ó/g,'o').replace(/Ó/g,'O')
        .replace(/ô/g,'o').replace(/Ô/g,'O').replace(/õ/g,'o').replace(/Õ/g,'O')
        .replace(/ú/g,'u').replace(/Ú/g,'U').replace(/ç/g,'c').replace(/Ç/g,'C')
        .replace(/ñ/g,'n').replace(/Ñ/g,'N').replace(/[^\x00-\x7F]/g,'');
};

/* ================================================================
   FUZZY LOGIC ENGINE
   ================================================================ */
function computeFuzzy(fuzzyType, emblematic, noHelp, answers) {
    const empty = { active:false, sensitiveDomains:[], minScore:100, scoreConditionMet:false, anyConditionMet:false, conditionDetails:{} };
    if (!fuzzyType) return empty;

    const cfg = FUZZY_TYPES.find(f=>f.key===fuzzyType);
    if (!cfg) return empty;

    const sensDomains = cfg.sensitiveDomains;

    // Per-domain analysis for conditions 1 and 2
    const domainDetails = {};
    let condition1Met = false; // has25or50 in ANY sensitive domain
    let condition2Met = false; // all75 in ANY single sensitive domain

    SCALE.domains.filter(d => sensDomains.includes(d.id)).forEach(d => {
        const scores = d.items.map(i => answers[i.id]);
        const answered = scores.filter(v => v !== undefined);
        const allAnswered = answered.length === d.items.length;

        // Condition 1: any item in this domain has score 25 or 50
        const has25or50 = answered.some(s => s === 25 || s === 50);
        // Condition 2: ALL items in this domain are 75 (domain must be fully answered)
        const all75 = allAnswered && d.items.length > 0 && answered.every(s => s === 75);

        if (has25or50) condition1Met = true;
        if (all75) condition2Met = true;

        domainDetails[d.id] = {
            title: d.title,
            totalItems: d.items.length,
            answeredCount: answered.length,
            has25or50,
            all75
        };
    });

    // Score condition: Condition1 (has25or50) OR Condition2 (all75)
    const scoreConditionMet = condition1Met || condition2Met;

    // Ativacao: basta UMA das 4 condicoes ser preenchida (logica OU)
    const anyConditionMet = scoreConditionMet || emblematic || noHelp;

    // When all conditions met, find min score across sensitive domain items
    let minScore = 100;
    if (anyConditionMet) {
        SCALE.domains.filter(d => sensDomains.includes(d.id)).forEach(d => {
            d.items.forEach(i => {
                if (answers[i.id] !== undefined && answers[i.id] < minScore) {
                    minScore = answers[i.id];
                }
            });
        });
    }

    // Gather totals for display
    const sensItems = SCALE.domains.filter(d => sensDomains.includes(d.id)).flatMap(d => d.items);
    const answeredCount = sensItems.filter(i => answers[i.id] !== undefined).length;

    return {
        active: anyConditionMet,
        sensitiveDomains: sensDomains,
        minScore,
        scoreConditionMet,
        anyConditionMet,
        conditionDetails: {
            condition1Met,
            condition2Met,
            domainDetails,
            answeredCount,
            totalSensItems: sensItems.length,
            emblematic,
            noHelp
        }
    };
}

/* Compute scores: returns raw sums, fuzzy sums, and domain averages */
function computeScores(answers, fuzzyResult) {
    let rawTotal=0, fuzzyTotal=0, missingCount=0, missingItems=[];
    let domRaw={}, domFuzzy={}, domRawAvg={}, domFuzzyAvg={};

    SCALE.domains.forEach(dom => {
        let sr=0, sf=0, answered=0;
        dom.items.forEach(item => {
            const v = answers[item.id];
            if (v === undefined) {
                missingCount++;
                missingItems.push(item.id);
            } else {
                answered++;
                sr += v;
                if (fuzzyResult.active && fuzzyResult.sensitiveDomains.includes(dom.id)) {
                    sf += fuzzyResult.minScore;
                } else {
                    sf += v;
                }
            }
        });
        domRaw[dom.id] = sr;
        domFuzzy[dom.id] = sf;
        // Domain average: sum / total items in domain (25-100 range)
        domRawAvg[dom.id] = dom.items.length > 0 ? Math.round((sr / dom.items.length) * 100) / 100 : 0;
        domFuzzyAvg[dom.id] = dom.items.length > 0 ? Math.round((sf / dom.items.length) * 100) / 100 : 0;
        rawTotal += sr;
        fuzzyTotal += sf;
    });

    // Total average: sum of domain averages / 7
    const rawAvg = Math.round((Object.values(domRawAvg).reduce((a,b)=>a+b,0) / 7) * 100) / 100;
    const fuzzyAvg = Math.round((Object.values(domFuzzyAvg).reduce((a,b)=>a+b,0) / 7) * 100) / 100;

    return { rawTotal, fuzzyTotal, domRaw, domFuzzy, domRawAvg, domFuzzyAvg, rawAvg, fuzzyAvg, missingCount, missingItems };
}

    );
};

                    return(

/* ================================================================
   MAIN APP
   ================================================================ */
const App=()=>{
    const [metadata,setMeta]=useState({participantId:'',evaluatorName:'',evaluationDate:new Date().toISOString().split('T')[0],center:'',observations:''});
    const [answers,setAnswers]=useState({});
    const [comments,setComments]=useState({});
    const [scoreTypes,setScoreTypes]=useState({}); // { itemId: 'D' | 'C' }
    const [barriers,setBarriers]=useState({}); // { itemId: { active, wouldChange, categories:{PT,AM,ApeR,AT,SSP} } }
    const [consent,setConsent]=useState(false);
    const [fuzzyState,setFuzzyState]=useState({type:'',emblematic:false,noHelp:false});
    const [step,setStep]=useState(0);

    /* Persistence */
    useEffect(()=>{try{const s=localStorage.getItem('ifbra_v5');if(s){const p=JSON.parse(s);if(p.answers)setAnswers(p.answers);if(p.comments)setComments(p.comments);if(p.scoreTypes)setScoreTypes(p.scoreTypes);if(p.barriers)setBarriers(p.barriers);if(p.metadata)setMeta(p.metadata);if(p.fuzzyState)setFuzzyState(p.fuzzyState);if(p.consent)setConsent(p.consent);}else{const s4=localStorage.getItem('ifbra_v4');if(s4){const p=JSON.parse(s4);if(p.answers)setAnswers(p.answers);if(p.comments)setComments(p.comments);if(p.metadata)setMeta(p.metadata);if(p.fuzzyState)setFuzzyState(p.fuzzyState);if(p.consent)setConsent(p.consent);}}}catch(e){}},[]);
    useEffect(()=>{if(consent)localStorage.setItem('ifbra_v5',JSON.stringify({answers,comments,scoreTypes,barriers,metadata,fuzzyState,consent}));else{localStorage.removeItem('ifbra_v5');localStorage.removeItem('ifbra_v4');}},[answers,comments,scoreTypes,barriers,metadata,fuzzyState,consent]);

    const handleAnswer=(id,val)=>{
        setAnswers(p=>({...p,[id]:val}));
        // Auto-set score type to D if not yet set
        if(!scoreTypes[id])setScoreTypes(p=>({...p,[id]:'D'}));
        // Clear barriers if score changes from 25
        if(val!==25)setBarriers(p=>{const n={...p};delete n[id];return n;});
    };
    const handleComment=(id,txt)=>setComments(p=>({...p,[id]:txt}));
    const handleScoreType=(id,type)=>setScoreTypes(p=>({...p,[id]:type}));
    const handleBarrier=(id,data)=>setBarriers(p=>({...p,[id]:data}));
    const fillDomain=(domId)=>{const dom=SCALE.domains.find(d=>d.id===domId);if(!dom)return;setAnswers(prev=>{const n={...prev};dom.items.forEach(i=>{n[i.id]=100;});return n;});setScoreTypes(prev=>{const n={...prev};dom.items.forEach(i=>{n[i.id]='D';});return n;});};

    /* Compute fuzzy */
    const fuzzyResult = useMemo(()=>
        computeFuzzy(fuzzyState.type,fuzzyState.emblematic,fuzzyState.noHelp,answers),
    [fuzzyState,answers]);

    /* Compute scores */
    const scores = useMemo(()=>computeScores(answers,fuzzyResult),[answers,fuzzyResult]);

    const domainProgress=useMemo(()=>{
        const p=[100,100];
        SCALE.domains.forEach(dom=>{const a=dom.items.filter(i=>answers[i.id]!==undefined).length;p.push(Math.round(a/dom.items.length*100));});
        return p;
    },[answers]);

    const answeredCount=TOTAL_ITEMS-scores.missingCount;
    const progress=Math.round(answeredCount/TOTAL_ITEMS*100);
    const stepNames=['Identificacao','Fuzzy',...SCALE.domains.map(d=>d.title.replace(/^\d+\.\s*/,'')),'Resultado'];

    const goStep=s=>{setStep(s);window.scrollTo({top:0,behavior:'smooth'});};
    const nextStep=()=>goStep(Math.min(step+1,stepNames.length-1));
    const prevStep=()=>goStep(Math.max(step-1,0));

    /* EXPORTS */
    const gfn=ext=>`IFBrA_${metadata.participantId||'anon'}_${metadata.evaluationDate}.${ext}`;

    const exportJSON=()=>{
        const cfg=FUZZY_TYPES.find(f=>f.key===fuzzyState.type);
        const payload={
            metadata:{...metadata,timestamp:new Date().toISOString(),scale:SCALE.title,version:SCALE.version},
            fuzzyConfig:{type:fuzzyState.type,typeLabel:cfg?.label||'',emblematic:fuzzyState.emblematic,noHelp:fuzzyState.noHelp,
                active:fuzzyResult.active,scoreConditionMet:fuzzyResult.scoreConditionMet,minScoreApplied:fuzzyResult.active?fuzzyResult.minScore:null,
                sensitiveDomains:fuzzyResult.sensitiveDomains},
            scores:{rawTotal:scores.rawTotal,fuzzyTotal:fuzzyResult.active?scores.fuzzyTotal:null,maxSingleEvaluator:4100,
                fuzzyDifference:fuzzyResult.active?scores.rawTotal-scores.fuzzyTotal:0,
                rawAvg:scores.rawAvg,fuzzyAvg:fuzzyResult.active?scores.fuzzyAvg:null},
            domains:SCALE.domains.map(d=>{
                const isSens=fuzzyResult.active&&fuzzyResult.sensitiveDomains.includes(d.id);
                return{id:d.id,title:d.title,rawScore:scores.domRaw[d.id],fuzzyScore:isSens?scores.domFuzzy[d.id]:null,
                    rawAvg:scores.domRawAvg[d.id],fuzzyAvg:isSens?scores.domFuzzyAvg[d.id]:null,
                    maxScore:d.items.length*100,fuzzyApplied:isSens,
                    items:d.items.map(i=>{
                        const bar=barriers[i.id];
                        return{id:i.id,text:i.text,rawScore:answers[i.id]??null,fuzzyScore:(isSens&&answers[i.id]!==undefined)?fuzzyResult.minScore:null,
                            scoreType:scoreTypes[i.id]||null,comment:comments[i.id]||'',
                            barrier:bar?.active?{wouldChange:bar.wouldChange||false,categories:bar.wouldChange?Object.entries(bar.categories||{}).filter(([,v])=>v).map(([k])=>k):[]}:null};
                    })};
            })
        };
        const b=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=gfn('json');a.click();
    };

    const exportCSV=()=>{
        let h=['participant_id','evaluator','date','center','raw_total','fuzzy_total','fuzzy_active','fuzzy_type','fuzzy_min_score','max_single_evaluator'];
        let r=[metadata.participantId,metadata.evaluatorName,metadata.evaluationDate,metadata.center,scores.rawTotal,fuzzyResult.active?scores.fuzzyTotal:'',fuzzyResult.active,fuzzyState.type||'',fuzzyResult.active?fuzzyResult.minScore:'',4100];
        SCALE.domains.forEach(d=>{
            const isSens=fuzzyResult.active&&fuzzyResult.sensitiveDomains.includes(d.id);
            h.push(`${d.id}_raw`,`${d.id}_fuzzy`,`${d.id}_max`);
            r.push(scores.domRaw[d.id],isSens?scores.domFuzzy[d.id]:'',d.items.length*100);
            d.items.forEach(i=>{
                const bar=barriers[i.id];
                const barCats=bar?.active&&bar?.wouldChange?BARRIER_CATS.filter(c=>bar.categories?.[c.key]).map(c=>c.key).join(';'):'';
                h.push(`item_${i.id}_raw`,`item_${i.id}_fuzzy`,`item_${i.id}_type`,`item_${i.id}_barriers`,`item_${i.id}_comment`);
                r.push(answers[i.id]??'',(isSens&&answers[i.id]!==undefined)?fuzzyResult.minScore:'',scoreTypes[i.id]||'',barCats,`"${(comments[i.id]||'').replace(/"/g,'""')}"`);
            });
        });
        const b=new Blob([h.join(',')+'\n'+r.join(',')],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=gfn('csv');a.click();
    };

    const exportPDF=()=>{
        const{jsPDF}=window.jspdf;
        const doc=new jsPDF();
        const showFuzzy=fuzzyState.type&&fuzzyResult.active;
        const cfg=FUZZY_TYPES.find(f=>f.key===fuzzyState.type);

        doc.setFontSize(18);doc.setFont(undefined,'bold');
        doc.text(S('Relatorio IF-BrA'),14,20);
        doc.setFontSize(9);doc.setFont(undefined,'normal');
        doc.text(S(SCALE.version),14,26);
        doc.setDrawColor(200);doc.line(14,29,196,29);

        let y=35;doc.setFontSize(10);
        doc.text(`Participante: ${S(metadata.participantId||'---')}`,14,y);y+=5;
        doc.text(`Avaliador: ${S(metadata.evaluatorName||'---')}`,14,y);y+=5;
        doc.text(`Data: ${metadata.evaluationDate}`,14,y);y+=5;
        doc.text(`Centro: ${S(metadata.center||'---')}`,14,y);y+=10;

        doc.setFontSize(13);doc.setFont(undefined,'bold');
        doc.text(`Escore original (avaliador unico): ${scores.rawTotal} / 4.100 (media: ${scores.rawAvg.toFixed(2)})`,14,y);y+=7;
        if(showFuzzy){doc.text(`Escore com logica fuzzy: ${scores.fuzzyTotal} / 4.100 (media: ${scores.fuzzyAvg.toFixed(2)})`,14,y);y+=7;
            doc.setFontSize(10);doc.setFont(undefined,'normal');
            doc.text(`Diferenca: ${scores.rawTotal-scores.fuzzyTotal} pontos reduzidos pela logica fuzzy`,14,y);y+=6;
        }

        doc.setFontSize(9);doc.setFont(undefined,'italic');
        doc.text(S('A classificacao requer a soma dos escores dos dois avaliadores (max. 8.200).'),14,y);y+=6;
        doc.setFont(undefined,'normal');

        if(fuzzyState.type){
            y+=2;
            doc.setFontSize(10);doc.setFont(undefined,'bold');
            doc.text(S(`Logica Fuzzy - Formulario 4: ${cfg?.label||''}`),14,y);y+=5;
            doc.setFont(undefined,'normal');doc.setFontSize(9);
            doc.text(S(`Dominios sensiveis: ${cfg?.sensitiveDomainLabels||''}`),14,y);y+=4;
            doc.text(`Cond. 1 (nota 25/50): ${fuzzyResult.conditionDetails.condition1Met?'Preenchida':'Nao preenchida'}`,14,y);y+=4;
            doc.text(`Cond. 2 (todas 75): ${fuzzyResult.conditionDetails.condition2Met?'Preenchida':'Nao preenchida'}`,14,y);y+=4;
            doc.text(S(`Cond. 3 (emblematica): ${fuzzyState.emblematic?'Sim':'Nao'} - ${cfg?.emblemLabel||''}`),14,y);y+=4;
            doc.text(`Cond. 4 (auxilio terceiros): ${fuzzyState.noHelp?'Indisponivel':'Disponivel'}`,14,y);y+=4;
            doc.text(`Ativacao: basta UMA condicao (Cond.1 OU Cond.2 OU Cond.3 OU Cond.4)`,14,y);y+=4;
            doc.text(`Status: ${fuzzyResult.active?'ATIVADA - nota minima '+fuzzyResult.minScore+' aplicada':'NAO ATIVADA'}`,14,y);y+=6;
        }

        // Detail table
        y+=2;
        doc.setFontSize(11);doc.setFont(undefined,'bold');
        doc.text('Detalhamento por Atividade',14,y);y+=4;

        const rows=[];
        SCALE.domains.forEach(d=>{
            const isSens=showFuzzy&&fuzzyResult.sensitiveDomains.includes(d.id);
            const dR=scores.domRaw[d.id],dF=isSens?scores.domFuzzy[d.id]:dR,mx=d.items.length*100;
            let hdr=S(d.title)+` | Original: ${dR}/${mx} (media: ${scores.domRawAvg[d.id].toFixed(1)})`;
            if(isSens)hdr+=` | Fuzzy: ${dF}/${mx} (media: ${scores.domFuzzyAvg[d.id].toFixed(1)})`;
            rows.push([{content:hdr,colSpan:7,styles:{fillColor:[235,235,240],fontStyle:'bold',fontSize:9}}]);
            d.items.forEach(i=>{
                const raw=answers[i.id];
                const fin=(isSens&&raw!==undefined)?fuzzyResult.minScore:raw;
                const sType=scoreTypes[i.id]||'';
                const bar=barriers[i.id];
                const barCats=bar?.active&&bar?.wouldChange?BARRIER_CATS.filter(c=>bar.categories?.[c.key]).map(c=>c.key).join(', '):'';
                rows.push([i.id,S(i.text),sType,raw!==undefined?String(raw):'---',(isSens&&raw!==undefined)?String(fin):'',barCats,S(comments[i.id]||'')]);
            });
        });

        doc.autoTable({
            startY:y,
            head:[[S('#'),S('Atividade'),'D/C','Nota',showFuzzy?'Fuzzy':'','Barreiras',S('Comentario')]],
            body:rows,theme:'grid',
            styles:{fontSize:7,font:'helvetica',cellPadding:2},
            headStyles:{fillColor:[30,30,30]},
            columnStyles:{0:{cellWidth:9},1:{cellWidth:52},2:{cellWidth:8},3:{cellWidth:10},4:{cellWidth:10},5:{cellWidth:28}}
        });

        const lastY=doc.lastAutoTable.finalY+10;
        if(lastY<260){
            doc.setFontSize(9);doc.setFont(undefined,'bold');
            doc.text(S('Faixas LC 142/2013 (escore combinado 2 avaliadores):'),14,lastY);
            doc.setFont(undefined,'normal');doc.setFontSize(8);
            doc.text(S('Grave: ate 5.739 | Moderada: 5.740 a 6.354 | Leve: 6.355 a 7.584 | Insuficiente: 7.585+'),14,lastY+5);
        }

        if(metadata.observations){doc.addPage();doc.setFontSize(12);doc.setFont(undefined,'bold');doc.text(S('Observacoes Gerais'),14,20);doc.setFontSize(10);doc.setFont(undefined,'normal');doc.text(doc.splitTextToSize(S(metadata.observations),180),14,28);}
        doc.save(gfn('pdf'));
    };

    const handleReset=()=>{if(!confirm('Apagar todos os dados e recomecar?'))return;setAnswers({});setComments({});setScoreTypes({});setBarriers({});setMeta({participantId:'',evaluatorName:'',evaluationDate:new Date().toISOString().split('T')[0],center:'',observations:''});setFuzzyState({type:'',emblematic:false,noHelp:false});setStep(0);localStorage.removeItem('ifbra_v5');localStorage.removeItem('ifbra_v4');};

    const domainIdx=step-2;
    const currentDomain=domainIdx>=0&&domainIdx<SCALE.domains.length?SCALE.domains[domainIdx]:null;

    return(
        <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
            <NavBar progress={progress} answeredCount={answeredCount}/>
            <div style={{padding:'12px 0 4px'}}><StepPills steps={stepNames} current={step} onStep={goStep} domainProgress={domainProgress}/></div>

            <main style={{flex:1,maxWidth:720,width:'100%',margin:'0 auto',padding:'20px 24px 120px'}}>

                {/* STEP 0 */}
                {step===0&&(
                    <div className="fade-in">
                        <div style={{textAlign:'center',marginBottom:32,paddingTop:16}}>
                            <h1 style={{fontSize:28,fontWeight:700,letterSpacing:'-.02em',marginBottom:8}}>Indice de Funcionalidade Brasileiro</h1>
                            <p style={{color:'var(--text-secondary)',fontSize:14,maxWidth:480,margin:'0 auto'}}>Avaliacao para classificacao e concessao de aposentadoria da pessoa com deficiencia — LC 142/2013.</p>
                        </div>
                        <div style={cardSt}>
                            <h2 style={secTit}>Identificacao</h2>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                                <Inp label="ID / Nome do participante" value={metadata.participantId} onChange={v=>setMeta({...metadata,participantId:v})}/>
                                <Inp label="Avaliador (nome / registro)" value={metadata.evaluatorName} onChange={v=>setMeta({...metadata,evaluatorName:v})}/>
                                <Inp label="Data da avaliacao" type="date" value={metadata.evaluationDate} onChange={v=>setMeta({...metadata,evaluationDate:v})}/>
                                <Inp label="Centro / local" value={metadata.center} onChange={v=>setMeta({...metadata,center:v})}/>
                            </div>
                            <div style={{marginTop:16}}><Inp label="Observacoes gerais" value={metadata.observations} onChange={v=>setMeta({...metadata,observations:v})} multiline/></div>
                        </div>
                        <div style={{...cardSt,marginTop:16}}>
                            <label style={chkSt}><input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} style={chkIn}/><div><strong>Salvar rascunho</strong><span style={{display:'block',fontSize:12,color:'var(--text-tertiary)'}}>Armazena temporariamente neste navegador. Nenhum dado e enviado pela internet.</span></div></label>
                        </div>
                    </div>
                )}

                {/* STEP 1: Fuzzy */}
                {step===1&&(
                    <div className="fade-in">
                        <div style={{textAlign:'center',marginBottom:24}}>
                            <h1 style={{fontSize:24,fontWeight:700}}>Formulario 4 — Modelo Linguistico Fuzzy</h1>
                            <p style={{color:'var(--text-secondary)',fontSize:14,maxWidth:520,margin:'8px auto 0'}}>Identifique situacoes de maior risco funcional. Basta uma das condicoes abaixo ser preenchida para que a menor nota nos dominios sensiveis seja aplicada a todas as atividades daqueles dominios.</p>
                        </div>
                        <div style={{...cardSt,borderLeft:'4px solid var(--purple)'}}>
                            <label style={{display:'block',fontSize:14,fontWeight:600,color:'var(--text-secondary)',marginBottom:8}}>Tipo de deficiencia principal</label>
                            <select value={fuzzyState.type} onChange={e=>setFuzzyState({...fuzzyState,type:e.target.value})} style={selSt}>
                                <option value="">Nenhuma / nao se aplica</option>
                                {FUZZY_TYPES.map(f=>(<option key={f.key} value={f.key}>{f.label}</option>))}
                            </select>

                            {fuzzyState.type&&(()=>{
                                const cfg=FUZZY_TYPES.find(f=>f.key===fuzzyState.type);
                                if(!cfg) return null;
                                return(
                                    <div style={{marginTop:20,padding:20,background:'var(--purple-light)',borderRadius:'var(--radius)',border:'1px solid #af52de30'}}>
                                        <p style={{fontSize:13,fontWeight:600,color:'var(--purple)',marginBottom:4}}>
                                            {cfg.label}
                                        </p>
                                        <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>
                                            Dominios sensiveis: <strong>{cfg.sensitiveDomainLabels}</strong>
                                        </p>

                                        {/* Condition 1: has 25 or 50 (automatic) */}
                                        <ConditionRow
                                            met={fuzzyResult.conditionDetails.condition1Met}
                                            auto={true}
                                            label="Condicao 1: Pontuacao 25 ou 50 em alguma atividade"
                                            detail={<>
                                                <span>{cfg.condition1Label}</span>
                                                {fuzzyResult.conditionDetails.domainDetails&&(
                                                    <div style={{marginTop:6,fontSize:12,color:'var(--text-tertiary)'}}>
                                                        {Object.entries(fuzzyResult.conditionDetails.domainDetails).map(([did,dd])=>(
                                                            <div key={did}>{dd.title}: {dd.answeredCount}/{dd.totalItems} respondidas{dd.has25or50?' — nota 25 ou 50 detectada':dd.answeredCount>0?' — nenhuma nota 25/50':''}</div>
                                                        ))}
                                                    </div>
                                                )}
                                            </>}
                                        />

                                        {/* Condition 2: all 75 (automatic) */}
                                        <ConditionRow
                                            met={fuzzyResult.conditionDetails.condition2Met}
                                            auto={true}
                                            label="Condicao 2: Todas as atividades com nota 75 em um dominio"
                                            detail={<>
                                                <span>{cfg.condition2Label}</span>
                                                {fuzzyResult.conditionDetails.domainDetails&&(
                                                    <div style={{marginTop:6,fontSize:12,color:'var(--text-tertiary)'}}>
                                                        {Object.entries(fuzzyResult.conditionDetails.domainDetails).map(([did,dd])=>(
                                                            <div key={did}>{dd.title}: {dd.all75?'TODAS com nota 75':dd.answeredCount<dd.totalItems?`${dd.answeredCount}/${dd.totalItems} respondidas`:'nem todas com nota 75'}</div>
                                                        ))}
                                                    </div>
                                                )}
                                            </>}
                                        />

                                        {/* Condition 3: Emblematic */}
                                        <label style={{cursor:'pointer',display:'block'}}>
                                            <div style={{display:'flex',alignItems:'flex-start',gap:12,padding:'10px 14px',background:fuzzyState.emblematic?'#34c75910':'white',borderRadius:'var(--radius-sm)',marginBottom:8,border:`1px solid ${fuzzyState.emblematic?'#34c75930':'var(--border-light)'}`}}>
                                                <input type="checkbox" checked={fuzzyState.emblematic} onChange={e=>setFuzzyState({...fuzzyState,emblematic:e.target.checked})} style={{...chkIn,marginTop:3}}/>
                                                <div style={{fontSize:13}}>
                                                    <div style={{fontWeight:600}}>Condicao 3: Questao emblematica</div>
                                                    <div style={{color:'var(--text-secondary)',marginTop:2}}>{cfg.emblemLabel}</div>
                                                </div>
                                            </div>
                                        </label>

                                        {/* Condition 4: No help */}
                                        <label style={{cursor:'pointer',display:'block'}}>
                                            <div style={{display:'flex',alignItems:'flex-start',gap:12,padding:'10px 14px',background:fuzzyState.noHelp?'#34c75910':'white',borderRadius:'var(--radius-sm)',marginBottom:8,border:`1px solid ${fuzzyState.noHelp?'#34c75930':'var(--border-light)'}`}}>
                                                <input type="checkbox" checked={fuzzyState.noHelp} onChange={e=>setFuzzyState({...fuzzyState,noHelp:e.target.checked})} style={{...chkIn,marginTop:3}}/>
                                                <div style={{fontSize:13}}>
                                                    <div style={{fontWeight:600}}>Condicao 4: Auxilio de terceiros</div>
                                                    <div style={{color:'var(--text-secondary)',marginTop:2}}>{cfg.noHelpLabel}</div>
                                                </div>
                                            </div>
                                        </label>

                                        {/* Result */}
                                        <div style={{marginTop:12,padding:'14px 16px',borderRadius:'var(--radius-sm)',fontSize:14,fontWeight:600,
                                            background:fuzzyResult.active?'#34c75915':'#ff3b3008',
                                            border:`1px solid ${fuzzyResult.active?'#34c75940':'#ff3b3020'}`,
                                            color:fuzzyResult.active?'#1a8c3a':'#cc2d24',
                                        }}>
                                            {fuzzyResult.active
                                                ?`Logica fuzzy ATIVADA — a menor nota encontrada nos dominios sensiveis (${fuzzyResult.minScore}) sera aplicada a todas as atividades destes dominios.`
                                                :'Logica fuzzy NAO ATIVADA — nenhuma das condicoes foi preenchida.'}
                                        </div>

                                        {fuzzyResult.active&&scores.rawTotal!==scores.fuzzyTotal&&(
                                            <div style={{marginTop:8,fontSize:13,color:'var(--text-secondary)'}}>
                                                Escore original: {scores.rawTotal} | Escore fuzzy: {scores.fuzzyTotal} | Diferenca: {scores.rawTotal-scores.fuzzyTotal} pontos
                                            </div>
                                        )}
                                    </div>
                                );
                            })()}
                        </div>
                    </div>
                )}

                {/* STEPS 2-8: Domains */}
                {currentDomain&&(
                    <div className="fade-in" key={currentDomain.id}>
                        <div style={{textAlign:'center',marginBottom:24}}>
                            <h1 style={{fontSize:24,fontWeight:700,marginTop:8}}>{currentDomain.title}</h1>
                            <p style={{color:'var(--text-secondary)',fontSize:14,marginTop:4}}>
                                {currentDomain.items.filter(i=>answers[i.id]!==undefined).length} de {currentDomain.items.length} atividades respondidas
                            </p>
                            {fuzzyResult.active&&fuzzyResult.sensitiveDomains.includes(currentDomain.id)&&(
                                <div style={{display:'inline-block',marginTop:8,padding:'4px 14px',borderRadius:100,background:'var(--purple-light)',color:'var(--purple)',fontSize:12,fontWeight:600}}>
                                    Dominio sensivel — logica fuzzy ativa (nota minima: {fuzzyResult.minScore})
                                </div>
                            )}
                        </div>
                        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
                            <button onClick={()=>{if(confirm(`Preencher todas as ${currentDomain.items.length} atividades com nota 100 (Independente)?`))fillDomain(currentDomain.id);}} style={{
                                padding:'8px 16px',borderRadius:100,border:'1px solid var(--border)',
                                background:'var(--surface)',color:'var(--text-secondary)',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit',transition:'all var(--transition)'}}>
                                Preencher tudo com 100
                            </button>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:12}}>
                            {currentDomain.items.map((item,idx)=>(
                                <div key={item.id} style={{animationDelay:`${idx*50}ms`}} className="fade-in">
                                    <ItemCard item={item} answer={answers[item.id]} comment={comments[item.id]}
                                        fuzzyActive={fuzzyResult.active&&fuzzyResult.sensitiveDomains.includes(currentDomain.id)}
                                        fuzzyMin={fuzzyResult.minScore}
                                        scoreType={scoreTypes[item.id]} barrier={barriers[item.id]}
                                        onAnswer={handleAnswer} onComment={handleComment}
                                        onScoreType={handleScoreType} onBarrier={handleBarrier}/>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* LAST STEP: Results */}
                {step===stepNames.length-1&&(
                    <ResultsPanel scores={scores} metadata={metadata} fuzzyState={fuzzyState} fuzzyResult={fuzzyResult} answers={answers} comments={comments} scoreTypes={scoreTypes} barriers={barriers}/>
                )}
            </main>

            {/* Bottom bar */}
            <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(245,245,247,.9)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderTop:'1px solid var(--border-light)',padding:'12px 24px',zIndex:50}}>
                <div style={{maxWidth:720,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
                    <button onClick={prevStep} disabled={step===0} style={{...btn('secondary'),opacity:step===0?.3:1,cursor:step===0?'default':'pointer'}}>Anterior</button>
                    <div style={{display:'flex',gap:8}}>
                        {step===stepNames.length-1&&(<>
                            <button onClick={exportPDF} style={btn('primary')}>PDF</button>
                            <button onClick={exportCSV} style={btn('outline')}>CSV</button>
                            <button onClick={exportJSON} style={btn('outline')}>JSON</button>
                            <button onClick={handleReset} style={{...btn('secondary'),color:'var(--red)'}}>Reiniciar</button>
                        </>)}
                    </div>
                    {step<stepNames.length-1?(<button onClick={nextStep} style={btn('primary')}>Proximo</button>):(<div style={{width:80}}/>)}
                </div>
            </div>
        </div>
    );
};

/* Styles */
const cardSt={background:'var(--surface)',borderRadius:'var(--radius-lg)',padding:'24px 28px',boxShadow:'var(--shadow-sm)',border:'1px solid var(--border-light)'};
const secTit={fontSize:18,fontWeight:700,letterSpacing:'-.01em',marginBottom:16};
const selSt={width:'100%',padding:'12px 16px',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',fontSize:15,fontFamily:'inherit',color:'var(--text-primary)',background:'var(--surface)',cursor:'pointer'};
const chkSt={display:'flex',alignItems:'flex-start',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border-light)',cursor:'pointer',fontSize:14};
const chkIn={width:20,height:20,borderRadius:6,accentColor:'var(--accent)',flexShrink:0,cursor:'pointer'};
const btn=v=>({padding:'10px 20px',borderRadius:100,fontSize:14,fontWeight:600,fontFamily:'inherit',cursor:'pointer',border:'none',transition:'all var(--transition)',whiteSpace:'nowrap',
    ...(v==='primary'?{background:'var(--text-primary)',color:'#fff'}:v==='outline'?{background:'var(--surface)',color:'var(--text-primary)',border:'1px solid var(--border)'}:{background:'var(--gray-200)',color:'var(--text-secondary)'})});
const Inp=({label,value,onChange,type='text',multiline=false})=>(<div><label style={{display:'block',fontSize:13,fontWeight:500,color:'var(--text-secondary)',marginBottom:6}}>{label}</label>
    {multiline?(<textarea value={value} onChange={e=>onChange(e.target.value)} rows={3} style={{width:'100%',padding:'10px 14px',border:'1px solid var(--border-light)',borderRadius:'var(--radius-sm)',fontSize:14,fontFamily:'inherit',color:'var(--text-primary)',resize:'vertical',background:'var(--surface-alt)'}}/>):
    (<input type={type} value={value} onChange={e=>onChange(e.target.value)} style={{width:'100%',padding:'10px 14px',border:'1px solid var(--border-light)',borderRadius:'var(--radius-sm)',fontSize:14,fontFamily:'inherit',color:'var(--text-primary)',background:'var(--surface-alt)'}}/>)}</div>);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
